<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Interactive</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="stars"></canvas>

<div class="top-bar">
    <h1>Solar System Explorer</h1>
    <input type="text" id="searchInput" placeholder="Search planet...">
    <button id="themeToggle">🌗</button>
</div>

<div class="solar-system">

    <div class="sun"></div>

    <!-- Planets will be injected by JS -->

</div>

<!-- Popup -->
<div class="popup hidden" id="planetPopup">
    <div class="popup-content">
        <span id="closePopup">✖</span>
        <h2 id="planetName"></h2>
        <img id="planetImage" />
        <div class="info"></div>
    </div>
</div>

<audio id="spaceSound" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_8f5c7b5d7c.mp3" type="audio/mpeg">
</audio>

<script src="planets.js"></script>
<script src="script.js"></script>

</body>
</html>
